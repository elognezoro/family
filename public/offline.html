<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1E9E57">
  <title>Hors ligne — EduWeb</title>
  <style>
    :root { --primary: #1E9E57; --primary-dark: #0E6B3A; --bg: #F4F6F0; --ink: #1b2620; --ink-light: #5b6b61; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--ink);
      font-family: "Schibsted Grotesk", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%; text-align: center;
      background: #fff; border-radius: 20px; padding: 36px 28px;
      box-shadow: 0 18px 48px rgba(14, 107, 58, 0.12);
    }
    .logo { width: 120px; height: 120px; margin: 0 auto 18px; display: block; }
    h1 { font-size: 1.4rem; margin: 0 0 10px; color: var(--primary-dark); }
    p { margin: 0 0 22px; color: var(--ink-light); line-height: 1.55; font-size: 0.98rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
      border: none; background: var(--primary); color: #fff; font: inherit; font-weight: 600;
      padding: 12px 22px; border-radius: 12px; transition: background .2s ease, transform .2s ease;
    }
    .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .badge {
      display: inline-block; margin-bottom: 18px; padding: 6px 14px; border-radius: 999px;
      background: #E2F3E8; color: var(--primary-dark); font-size: 0.78rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/images/logo.svg" alt="EduWeb — Family & Coaching">
    <div class="badge">Vous êtes hors ligne</div>
    <h1>Pas de connexion Internet</h1>
    <p>Impossible de charger cette page pour le moment. Vérifiez votre connexion, puis réessayez. EduWeb reste installé sur votre appareil.</p>
    <button class="btn" onclick="location.reload()">Réessayer</button>
  </div>
  <script>
    // Recharge automatiquement dès le retour de la connexion.
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
